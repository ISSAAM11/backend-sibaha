services:
  - type: web
    name: shibaha-backend
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn sibaha_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "backend-sibaha.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: shibaha-db
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: shibaha-db
    databaseName: shibaha
    user: shibaha
    plan: free
